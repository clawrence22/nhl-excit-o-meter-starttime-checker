name: Deploy with Terraform

on:
  workflow_run:
    workflows:
      - Build and Deploy Lambda ZIP
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag to deploy (defaults to triggering commit SHA)"
        required: false
        type: string

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "871806636838"

jobs:
  terraform-deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::871806636838:role/github-actions
          role-session-name: github-actions-terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (S3 backend)
        run: |
          terraform -chdir=iac init -input=false

      - name: Terraform Plan
        run: |
          terraform -chdir=iac plan -input=false \
            -out=tfplan

      - name: Terraform Apply
        run: terraform -chdir=iac apply -input=false -auto-approve tfplan

