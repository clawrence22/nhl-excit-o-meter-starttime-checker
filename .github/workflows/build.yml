name: Build and Deploy Lambda ZIP

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  S3_BUCKET: nhl-excit-o-meter-starttime-checker-lambda-deploy
  VERSION: ${{ github.sha }}

jobs:
  build-deploy-lambda:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create deployment package
      run: |
        zip -r lambda_function.zip src/lambda_function.py

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ env.AWS_REGION }}
        role-to-assume: arn:aws:iam::871806636838:role/github-actions
        role-session-name: github-actions-lambda-deploy

    - name: Verify AWS identity
      run: aws sts get-caller-identity

    - name: Upload to S3
      run: |
        aws s3 cp lambda_function.zip s3://${{ env.S3_BUCKET }}/lambda_function-${{ env.VERSION }}.zip

    - name: Deployment complete
      run: |
        echo "Lambda ZIP uploaded to s3://${{ env.S3_BUCKET }}/lambda_function-${{ env.VERSION }}.zip"
